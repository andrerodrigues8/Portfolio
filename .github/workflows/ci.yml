name: CI

on:
  push:
    branches: ['dev']
  pull_request:
    branches: ['main']

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (if you have them)
        run: npm test --if-present

      - name: Build project
        run: npm run build